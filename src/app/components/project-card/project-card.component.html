<div class="project-card" (click)="onView()">
  <div class="card-header">
    <div class="badge" [ngClass]="project.status.toLowerCase()">{{ project.status }}</div>
    <span class="date">{{ project.createdAt | date:'shortDate' }}</span>
  </div>

  <h3 class="title">{{ project.title }}</h3>
  <p class="description">{{ project.description | slice:0:100 }}{{ project.description.length > 100 ? '...' : '' }}</p>

  <div class="card-footer">
    <div class="creator">
      <i class="fas fa-user-circle"></i>
      <span>{{ project.creatorName }}</span>
    </div>
    <button class="view-btn">
      Details <i class="fas fa-chevron-right"></i>
    </button>
  </div>
</div>
