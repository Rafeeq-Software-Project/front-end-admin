<div class="dashboard-container" [class.sidebar-closed]="!showSidebarLabels"
  [class.mobile-sidebar-open]="isMobileSidebarOpen()">

  <div class="sidebar-overlay" (click)="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <img src="assets/logo-1.webp" alt="Rafeeq">
        <span *ngIf="showSidebarLabels">Rafeeq Admin</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a (click)="changeView('overview')" [class.active]="currentView === 'overview'" class="nav-item">
        <i class="fas fa-th-large"></i>
        <span *ngIf="showSidebarLabels">Dashboard</span>
      </a>
      <a (click)="changeView('pending')" [class.active]="currentView === 'pending'" class="nav-item">
        <i class="fas fa-project-diagram"></i>
        <span *ngIf="showSidebarLabels">Pending Projects</span>
      </a>
      <a (click)="changeView('drafts')" [class.active]="currentView === 'drafts'" class="nav-item">
        <i class="fas fa-file-alt"></i>
        <span *ngIf="showSidebarLabels">Draft Projects</span>
      </a>

      <div class="nav-spacer"></div>

      <button (click)="logout()" class="nav-item logout-btn">
        <i class="fas fa-sign-out-alt"></i>
        <span *ngIf="showSidebarLabels">Logout</span>
      </button>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <div class="content-wrapper">
    <!-- Top Header -->
    <header class="top-header">
      <div class="header-left">
        <button class="toggle-btn" (click)="toggleSidebar()">
          <i class="fas" [class.fa-indent]="!showSidebarLabels" [class.fa-outdent]="showSidebarLabels"></i>
        </button>
        <h2 class="page-title">Admin Dashboard</h2>
      </div>
    </header>

    <!-- Page Content -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
