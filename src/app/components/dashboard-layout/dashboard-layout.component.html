<div class="dashboard-container" [class.sidebar-closed]="!isSidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <img src="assets/logo-1.webp" alt="Rafeeq">
        <span *ngIf="isSidebarOpen">Rafeeq Admin</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin-dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
        class="nav-item">
        <i class="fas fa-th-large"></i>
        <span *ngIf="isSidebarOpen">Dashboard</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fas fa-project-diagram"></i>
        <span *ngIf="isSidebarOpen">pinding Projects</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fas fa-users"></i>
        <span *ngIf="isSidebarOpen">drafts</span>
      </a>
      <!-- <a href="#" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span *ngIf="isSidebarOpen">Analytics</span>
      </a>
      <div class="nav-spacer"></div>
      <a href="#" class="nav-item">
        <i class="fas fa-cog"></i>
        <span *ngIf="isSidebarOpen">Settings</span>
      </a> -->
      <button (click)="logout()" class="nav-item logout-btn">
        <i class="fas fa-sign-out-alt"></i>
        <span *ngIf="isSidebarOpen">Logout</span>
      </button>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <div class="content-wrapper">
    <!-- Top Header -->
    <header class="top-header">
      <div class="header-left">
        <button class="toggle-btn" (click)="toggleSidebar()">
          <i class="fas" [class.fa-indent]="!isSidebarOpen" [class.fa-outdent]="isSidebarOpen"></i>
        </button>
        <h2 class="page-title">Admin Dashboard</h2>
      </div>

      <div class="header-right">
        <!-- Theme Toggle -->
        <button (click)="toggleTheme()" class="icon-btn theme-toggle"
          [title]="isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
          <i class="fas" [class.fa-sun]="isDarkMode" [class.fa-moon]="!isDarkMode"></i>
        </button>

        <!-- Notifications -->
        <button class="icon-btn">
          <i class="fas fa-bell"></i>
          <span class="badge">3</span>
        </button>

        <!-- User Profile -->
        <div class="user-profile">
          <div class="avatar">
            <img src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff" alt="User">
          </div>
          <div class="user-info" *ngIf="isSidebarOpen">
            <span class="name">Admin User</span>
            <span class="role">Administrator</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
